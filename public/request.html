<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script
      src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.10/dist/htmx.min.js"
      crossorigin="anonymous"
    ></script>
    <script>
      htmx.config.selfRequestsOnly = false;
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <title>HTMX Crash Course</title>
  </head>
  <body>
    <div class="text-center">
      <h1 class="text-2xl font-bold my-5">Simple Request Example</h1>
      <button
        hx-get="/users"
        hx-target="#users"
        hx-confirm="Are you sure you want to fetch users?"
        hx-indicator="#loading"
        hx-vals='{"limit": 5}'
        class="bg-blue-500 text-white py-2 px-3 my-5 rounded-lg"
      >
        Fetch Users
      </button>
      <span class="htmx-indicator" id="loading">
        <img src="img/loader.gif" alt="Loading..." class="m-auto h-10" />
      </span>
      <div id="users"></div>
    </div>
  </body>
</html>
